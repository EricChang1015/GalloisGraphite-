# Mada Graphite — self-hosted Supabase override (4GB-friendly)
#
# Compose files (on server):
#   upstream/docker-compose.yml          ← official Supabase stack
#   ../docker-compose.override.yml     ← this file
#
# Profiles (opt-in — services WITHOUT a profile always run):
#   (default)    App runtime for Mada Graphite platform
#   dashboard    Studio + meta + analytics + vector (~1GB extra RAM)
#   imgproxy     Storage image transforms (not used by our app; optional)
#   pooler       Supavisor connection pooler (port 5432; usually off)
#   edge         Edge Functions (MVP not used)
#
# Examples (run from /data/deploy/supabase/upstream):
#   docker compose -f docker-compose.yml -f ../docker-compose.override.yml up -d --remove-orphans
#   docker compose -f docker-compose.yml -f ../docker-compose.override.yml --profile dashboard up -d
#   docker compose -f docker-compose.yml -f ../docker-compose.override.yml --profile dashboard down
#
# See COMPOSE.md for full documentation.

services:
  # ── Core API gateway ─────────────────────────────────────────────
  kong:
    ports: !reset []
    # Upstream waits for studio; runtime stack does not need Studio.
    depends_on: !override
      db:
        condition: service_healthy

  # ── Postgres data on host volume ─────────────────────────────────
  db:
    volumes:
      - /data/data/postgres:/var/lib/postgresql/data:Z
      - ./volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ./volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      - db-config:/etc/postgresql-custom

  # ── Storage (file backend; no on-the-fly transforms by default) ──
  storage:
    volumes:
      - /data/data/storage:/var/lib/storage:z
    environment:
      ENABLE_IMAGE_TRANSFORMATION: "false"
    depends_on: !override
      db:
        condition: service_healthy
      rest:
        condition: service_started

  # ── Dashboard / ops (opt-in: --profile dashboard) ────────────────
  analytics:
    profiles:
      - dashboard

  vector:
    profiles:
      - dashboard

  meta:
    profiles:
      - dashboard

  studio:
    profiles:
      - dashboard

  # ── Optional extras (opt-in) ─────────────────────────────────────
  imgproxy:
    profiles:
      - imgproxy
    volumes:
      - /data/data/storage:/var/lib/storage:z

  supavisor:
    profiles:
      - pooler

  functions:
    profiles:
      - edge
