# Supabase Studio (Dashboard) — office IP whitelist only
# Allowed: 202.175.105.50, 52.229.168.52 (Azure jump / office)
# UI proxied to supabase-studio:3000; /pg/ via Kong (postgres-meta)
# Also: http://127.0.0.1:54323 via SSH tunnel when dashboard profile is running

location = /studio {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;
    return 301 /studio/;
}

location /studio/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include conf.d/proxy.cfg;
}

# /_next/ split between App and Studio via next-studio-map.cfg + locations.cfg

