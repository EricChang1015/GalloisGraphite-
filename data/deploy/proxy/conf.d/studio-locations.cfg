# Supabase Studio (Dashboard) — IP whitelist only
# UI proxied directly to supabase-studio:3000 (no Kong basic auth)
# /pg/ still via Kong (postgres-meta)

location = /studio {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;
    return 301 /studio/;
}

location /studio/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include conf.d/proxy.cfg;
}

location /_next/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/_next/;
    include conf.d/proxy.cfg;
}

location /project/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/project/;
    include conf.d/proxy.cfg;
}

location /org/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/org/;
    include conf.d/proxy.cfg;
}

location /sign-in/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/sign-in/;
    include conf.d/proxy.cfg;
}

location /api/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_studio/api/;
    include conf.d/proxy.cfg;
}

location /pg/ {
    allow 202.175.105.50;
    allow 52.229.168.52;
    deny all;

    proxy_pass http://supabase_kong/pg/;
    include conf.d/proxy.cfg;
}
