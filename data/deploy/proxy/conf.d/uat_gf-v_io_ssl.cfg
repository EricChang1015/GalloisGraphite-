# 服务器证书链（服务器证书 + 中间证书）
ssl_certificate /etc/nginx/conf.d/uat_gf-v_io.fullchain.pem;

# 服务器私钥
ssl_certificate_key /etc/nginx/conf.d/uat_gf-v_io.rsa.key;

# 协议和加密套件
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
ssl_ecdh_curve secp384r1;

# 会话缓存
ssl_session_cache shared:SSL:10m; # holds approx 40000 sessions
ssl_session_timeout 24h;
ssl_session_tickets on;  # nginx 1.23.2+

# 性能优化
ssl_buffer_size 8k;

# 启用 OCSP Stapling
ssl_stapling on;

# 启用 OCSP 响应验证
ssl_stapling_verify on;

# OCSP 验证证书链（中间证书 + 根证书）
ssl_trusted_certificate /etc/nginx/conf.d/uat_gf-v_io.chain.pem;

# OCSP stapling uses server-level resolver from nginx.conf http {} block

# 隐藏服务器信息
server_tokens off;

# 安全头部
# 强制浏览器只通过 HTTPS 连接访问网站，防止协议降级攻击。 
add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload" always;

# 阻止浏览器进行 MIME 类型嗅探，强制浏览器严格按照 Content-Type 头部处理资源。
add_header X-Content-Type-Options nosniff always;

add_header X-Frame-Options ALLOWALL always;  # 允许 iframe 嵌入
