# Next.js App (Phase 2) + Supabase API (Phase 1)
# Order: specific API paths first, then catch-all to Next.js.

# Supabase API (Kong via upstream supabase_kong)
location /auth/v1/ {
    proxy_pass http://supabase_kong/auth/v1/;
    include conf.d/proxy.cfg;
}

location /rest/v1/ {
    proxy_pass http://supabase_kong/rest/v1/;
    include conf.d/proxy.cfg;
}

location /realtime/v1/ {
    proxy_pass http://supabase_kong/realtime/v1/;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include conf.d/proxy.cfg;
}

location /storage/v1/ {
    client_max_body_size 20m;
    proxy_pass http://supabase_kong/storage/v1/;
    proxy_set_header Connection "";
    include conf.d/proxy.cfg;
}

# Next.js API routes (must beat studio /api/ whitelist if enabled)
location /api/chat {
    proxy_pass http://mada_next;
    proxy_buffering off;
    include conf.d/proxy.cfg;
}

location /api/cron/ {
    proxy_pass http://mada_next;
    include conf.d/proxy.cfg;
}

# Next.js RSC payloads — always App (beats studio /_next/ prefix)
location /_next/data/ {
    proxy_pass http://mada_next;
    include conf.d/proxy.cfg;
}

# Next.js vs Studio static chunks (see next-studio-map.cfg)
location /_next/static/ {
    proxy_pass $next_static_pass;
    include conf.d/proxy.cfg;
}

# Remaining /_next/* — App only (Studio uses /_next/static/ via referer map above)
location /_next/ {
    proxy_pass http://mada_next;
    include conf.d/proxy.cfg;
}

# Next.js App (all other paths)
location / {
    proxy_pass http://mada_next;
    include conf.d/proxy.cfg;
}
