# Route /_next/static/ to Studio or Next.js based on Referer (same path prefix, different builds).
map $http_referer $studio_static_upstream {
    default 0;
    "~*/studio" 1;
    "~*/project/" 1;
    "~*/org/" 1;
    "~*/sign-in" 1;
}

map $studio_static_upstream $next_static_pass {
    default http://mada_next;
    1       http://supabase_studio;
}
