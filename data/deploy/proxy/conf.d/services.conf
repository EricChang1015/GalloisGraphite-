# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name uat.gf-v.io;
    return 301 https://$host$request_uri;
}

# gf-v.io HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name uat.gf-v.io;
    access_log off;

    include conf.d/uat_gf-v_io_ssl.cfg;

    root /var/www/html;
    index index.html index.htm;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Studio: use SSH tunnel when dashboard profile is running (conflicts with Next /_next/).
    # include conf.d/studio-locations.cfg;
    include conf.d/locations.cfg;
}
