services:
  proxy:
    container_name: proxy
    image: nginx:1.30.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - ./html:/var/www/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /data/data/storage:/var/www/html/files
    networks:
      - supabase_default
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "5"

networks:
  supabase_default:
    external: true
